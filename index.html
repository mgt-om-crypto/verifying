<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.G.T - Professional Verification</title>
<style>
:root { 
    --bg-soft: #eef2f7; 
    --card-bg: #dfe6ed; 
    --accent-blue: #5d8aa8; 
    --mint-status: #48a9a6;
    --text-color: #4a5568;
    --border-soft: #cbd5e0;
}

body { 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background-color: var(--bg-soft); 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    min-height: 100vh; 
    color: var(--text-color);
}

/* Minimalist Soft Header */
header { 
    width: 100%; 
    background: var(--card-bg); 
    padding: 20px 0; 
    text-align: center; 
    border-bottom: 1px solid var(--border-soft);
}
.heading-main { 
    font-size: 18px; 
    font-weight: 600; 
    color: var(--accent-blue); 
    letter-spacing: 1px;
    text-transform: uppercase;
}
.sub-heading { 
    font-size: 11px; 
    color: var(--text-color); 
    margin-top: 4px; 
    letter-spacing: 2px;
}

/* Soft Styled Container */
.container { 
    background: var(--card-bg); 
    width: 85%; 
    max-width: 380px; 
    margin-top: 50px; 
    padding: 35px; 
    border-radius: 20px; 
    border: 1px solid var(--border-soft);
    box-shadow: 10px 10px 20px #d1d9e6, -10px -10px 20px #ffffff;
    text-align: center;
}

h2 { font-size: 20px; color: var(--text-color); margin-bottom: 5px; }
p { font-size: 13px; margin-bottom: 25px; opacity: 0.8; }

input[type="text"] { 
    width: 100%; 
    padding: 14px; 
    margin-bottom: 20px; 
    border: none; 
    border-radius: 12px; 
    font-size: 16px; 
    background: var(--bg-soft);
    box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
    box-sizing: border-box;
    outline: none;
    color: var(--text-color);
}

button { 
    width: 100%; 
    background: var(--accent-blue); 
    color: white; 
    padding: 15px; 
    border: none; 
    border-radius: 12px; 
    font-size: 14px; 
    font-weight: bold; 
    cursor: pointer; 
    transition: 0.3s;
    box-shadow: 4px 4px 10px rgba(0,0,0,0.1);
}
button:hover { opacity: 0.9; transform: translateY(-1px); }

/* Neumorphic Result Card */
#resultCard { 
    display: none; 
    background: var(--card-bg); 
    width: 90%; 
    max-width: 450px; 
    margin: 40px 0; 
    border-radius: 25px; 
    padding: 20px;
    border: 1px solid var(--border-soft);
    box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff;
}

.result-header { 
    padding: 15px; 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    border-bottom: 1px solid var(--border-soft);
}

.profile-pic { 
    width: 90px; 
    height: 110px; 
    border-radius: 15px; 
    object-fit: cover; 
    background: var(--bg-soft);
    border: 2px solid #fff;
}

.user-name { font-size: 18px; font-weight: 700; color: var(--accent-blue); }
.verify-badge { color: var(--mint-status); font-size: 11px; font-weight: bold; }

.info-box { padding: 20px 10px; }
.info-row { 
    display: flex; 
    justify-content: space-between; 
    padding: 10px 0; 
    border-bottom: 1px solid rgba(203, 213, 224, 0.5); 
    font-size: 13px;
}
.label { font-weight: 500; opacity: 0.7; }
.value { font-weight: 600; text-align: right; }

.qr-area { 
    text-align: center; 
    padding: 15px; 
    background: var(--bg-soft); 
    border-radius: 15px; 
    margin-top: 10px;
}
.qr-area img { width: 80px; mix-blend-mode: multiply; }

footer { margin-top: auto; padding: 25px; font-size: 10px; opacity: 0.6; text-align: center; line-height: 1.5; }

.loader { display: none; border: 3px solid #cbd5e0; border-top: 3px solid var(--accent-blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
    <div class="heading-main">M.G.T Record System</div>
    <div class="sub-heading">Global Verification Standards</div>
</header>

<div class="container" id="searchBox">
    <h2>Verify Record</h2>
    <p>Secure lookup via System ID</p>
    <div id="loader" class="loader"></div>
    <input type="text" id="certInput" placeholder="Enter ID (e.g. 636)">
    <button onclick="verifyID()">ACCESS DATA</button>
</div>

<div id="resultCard">
    <div class="result-header">
        <img id="u_photo" src="" alt="User" class="profile-pic">
        <div>
            <div id="u_name" class="user-name"></div>
            <div id="u_id_info" style="font-size: 12px; margin-bottom: 4px;"></div>
            <div class="verify-badge">✓ SYSTEM VERIFIED</div>
        </div>
    </div>

    <div class="info-box">
        <div class="info-row"> <span class="label">Full Name</span> <span class="value" id="res_name"></span> </div>
        <div class="info-row"> <span class="label">Resident No</span> <span class="value" id="u_res_no"></span> </div>
        <div class="info-row"> <span class="label">Qualification</span> <span class="value" id="u_as" style="color: var(--accent-blue);"></span> </div>
        <div class="info-row"> <span class="label">Trainer</span> <span class="value" id="u_trainer"></span> </div>
        <div class="info-row"> <span class="label">Location</span> <span class="value" id="u_loc"></span> </div>
        <div class="info-row"> <span class="label">Issued on</span> <span class="value" id="u_issue"></span> </div>
        <div class="info-row"> <span class="label">Expiry Date</span> <span class="value" id="u_expiry" style="color: #e53e3e;"></span> </div>
    </div>

    <div class="qr-area">
        <img id="qr_image" src="" alt="QR">
        <div style="font-size: 9px; margin-top: 5px; opacity: 0.5;">SECURE VALIDATION SEAL</div>
    </div>

    <button onclick="window.location.reload()" style="margin: 20px auto 10px; width: 80%; background: var(--bg-soft); color: var(--text-color); box-shadow: 4px 4px 8px #d1d9e6; display: block;">NEW SEARCH</button>
</div>

<footer>
    © 2026 M.G.T MANAGEMENT GROUP<br>
    Professional Skills Database Services
</footer>

<script>
async function verifyID() {
    const inputID = document.getElementById('certInput').value.trim();
    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('resultCard');
    const searchBox = document.getElementById('searchBox');

    if (!inputID) return alert("Please enter an ID.");
    loader.style.display = "block";

    const sheetId = '19Lkwwaty_oxl3Pq--frZ0xomrSXpxg4ZCFK6YVGvF6A';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    try {
        const response = await fetch(url);
        const data = await response.text();
        const rows = data.split('\n').map(row => 
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim())
        );

        const match = rows.find(row => row[0] === inputID);

        if (match) {
            document.getElementById('u_id_info').innerText = "System ID: #" + match[0];
            document.getElementById('u_name').innerText = match[1];
            document.getElementById('res_name').innerText = match[1];
            document.getElementById('u_as').innerText = match[6];
            document.getElementById('u_res_no').innerText = match[7];
            document.getElementById('u_trainer').innerText = match[8];
            document.getElementById('u_loc').innerText = match[4] + ", " + match[5];
            document.getElementById('u_issue').innerText = match[9];
            document.getElementById('u_expiry').innerText = match[10];
            document.getElementById('u_photo').src = match[11];

            document.getElementById('qr_image').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(window.location.href)}`;

            resultCard.style.display = "block";
            searchBox.style.display = "none";
        } else {
            alert("No record found.");
        }
    } catch (e) {
        alert("Network error. Please try again.");
    } finally {
        loader.style.display = "none";
    }
}
</script>
</body>
</html>
