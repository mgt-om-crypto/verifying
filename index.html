<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genuinity Check - Verification System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tuv-blue { background-color: #005596; }
        .tuv-text { color: #005596; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="bg-white border-b-4 border-blue-900 p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/17/T%C3%9CV_S%C3%9CD_logo.svg" class="h-10 mr-3">
            <span class="tuv-text font-bold text-xl tracking-tighter">TÜV SÜD MIDDLE EAST</span>
        </div>
        <button class="text-xs border px-2 py-1 text-gray-400">HOME</button>
    </div>

    <div class="max-w-md mx-auto mt-10 p-4">
        
        <div id="search-box" class="bg-white p-6 rounded-lg shadow-xl text-center border border-gray-200">
            <h1 class="text-gray-600 text-lg font-medium">WELCOME TO GENUINITY CHECK</h1>
            <h2 class="text-gray-800 font-bold text-xl mb-6">VERIFY CARD / CERTIFICATE</h2>
            
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/17/T%C3%9CV_S%C3%9CD_logo.svg" class="h-20 mx-auto mb-6 opacity-80">
            
            <p class="text-sm text-gray-500 mb-2">Please Enter Report / Certificate / ID Card Number</p>
            <input type="text" id="certId" placeholder="CERTIFICATE OR ID CARD NUMBER" 
                   class="w-full border-2 border-gray-200 p-3 rounded mb-4 text-center focus:border-blue-500 outline-none font-bold">
            
            <button onclick="checkCertificate()" id="submitBtn" 
                    class="w-full tuv-blue text-white font-bold py-3 rounded-md hover:bg-blue-800 transition-all uppercase tracking-widest">
                Submit!
            </button>
            <p id="error" class="text-red-500 mt-4 hidden">Certificate Not Found! Please try again.</p>
        </div>

        <div id="result-box" class="bg-white rounded shadow-2xl hidden overflow-hidden border border-gray-200">
            <div class="flex p-4 gap-4 bg-white">
                <div class="w-1/3">
                    <img id="res-photo" src="" class="w-full border-2 border-blue-900 rounded shadow-sm bg-gray-100">
                    <div id="res-name-label" class="tuv-blue text-white text-[10px] p-2 mt-1 font-bold text-center uppercase leading-tight"></div>
                </div>
                <div class="w-2/3">
                    <h3 id="res-id" class="tuv-text font-black text-sm mb-3 border-b pb-1"></h3>
                    <div class="text-[10px] space-y-1.5 uppercase font-medium">
                        <p><span class="text-gray-400 w-24 inline-block">TYPE</span> : <span id="res-type" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">COMPANY NAME</span> : <span id="res-company" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">LOCATION</span> : <span id="res-location" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">COUNTRY</span> : <span id="res-country" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">CERTIFIED AS</span> : <span id="res-certified" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">IQAMA NO</span> : <span id="res-iqama" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">TRAINER</span> : <span id="res-trainer" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">ISSUE DATE</span> : <span id="res-issue" class="text-gray-800"></span></p>
                        <p><span class="text-gray-400 w-24 inline-block">EXPIRY DATE</span> : <span id="res-expiry" class="text-gray-800"></span></p>
                    </div>
                </div>
            </div>
            <button onclick="window.location.reload()" class="w-full bg-gray-100 py-3 text-xs font-bold text-gray-500 border-t hover:bg-gray-200 uppercase">Back to Search</button>
        </div>
    </div>

    <script>
        // আপনার Apps Script পাবলিশ করার পর যে URL পাবেন তা এখানে বসান
        const WEB_APP_URL = "আপনার_DEPLOYED_WEB_APP_URL_এখানে_দিন";

        async function checkCertificate() {
            const id = document.getElementById('certId').value;
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('error');

            if(!id) return alert("Please enter ID!");

            btn.innerText = "Processing...";
            btn.disabled = true;
            error.classList.add('hidden');

            try {
                const response = await fetch(`${WEB_APP_URL}?id=${id}`);
                const result = await response.json();

                if(result.status === "success") {
                    const d = result.data;
                    document.getElementById('search-box').classList.add('hidden');
                    document.getElementById('result-box').classList.remove('hidden');

                    // ডাটা ম্যাপিং
                    document.getElementById('res-id').innerText = d.ID;
                    document.getElementById('res-name-label').innerText = d.Name;
                    document.getElementById('res-type').innerText = d.Type;
                    document.getElementById('res-company').innerText = d.Company;
                    document.getElementById('res-location').innerText = d.Location;
                    document.getElementById('res-country').innerText = d.Country;
                    document.getElementById('res-certified').innerText = d.Certified_As;
                    document.getElementById('res-iqama').innerText = d.Iqama_No;
                    document.getElementById('res-trainer').innerText = d.Trainer;
                    document.getElementById('res-issue').innerText = d.Issue_Date;
                    document.getElementById('res-expiry').innerText = d.Expiry_Date;
                    document.getElementById('res-photo').src = d.Photo_URL;
                } else {
                    error.classList.remove('hidden');
                }
            } catch (e) {
                alert("Server Error! Check Internet or Script URL.");
            } finally {
                btn.innerText = "Submit!";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
